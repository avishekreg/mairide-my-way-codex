<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1F2D38" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MaiRide" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MaiRide my way - Empty Leg Rides</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const host = String(window.location.hostname || '').toLowerCase();
      const isLandingHost = host === 'mairide.in' || host === 'www.mairide.in';
      const searchParams = new URLSearchParams(window.location.search || '');
      const hashParams = new URLSearchParams(String(window.location.hash || '').replace(/^#/, ''));
      const hasAuthCallbackMarkers = [
        'code',
        'access_token',
        'refresh_token',
        'error',
        'error_code',
        'error_description',
        'oauthMode',
        'oauthRole',
      ].some((key) => searchParams.has(key) || hashParams.has(key));

      if (isLandingHost) {
        if (hasAuthCallbackMarkers) {
          const target = `https://rides.mairide.in${window.location.pathname}${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        } else {
          const target = `/landing.html${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        }
      } else {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
