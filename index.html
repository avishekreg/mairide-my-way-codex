<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1F2D38" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MaiRide" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MaiRide my way - Empty Leg Rides</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const host = String(window.location.hostname || '').toLowerCase();
      const isLandingHost = host === 'mairide.in' || host === 'www.mairide.in';
      const marketingPolicyRedirects = {
        '/terms': '/terms-and-conditions.html',
        '/privacy': '/privacy-policy.html',
        '/refund': '/terms-and-conditions.html#refund-policy',
        '/terms-of-use': '/terms-and-conditions.html#terms-of-use',
      };
      const isAppLikeRuntime = (() => {
        const protocol = String(window.location.protocol || '').toLowerCase();
        const ua = String(window.navigator?.userAgent || '').toLowerCase();
        const hasCordova = typeof window.cordova !== 'undefined';
        const hasReactNative = typeof window.ReactNativeWebView !== 'undefined';
        const isStandalone = typeof window.matchMedia === 'function'
          && window.matchMedia('(display-mode: standalone)').matches;
        const isLocalAppHost = (host === 'localhost' || host === '127.0.0.1') && !String(window.location.port || '').trim();

        return (
          protocol === 'capacitor:'
          || protocol === 'ionic:'
          || hasCordova
          || hasReactNative
          || isStandalone
          || isLocalAppHost
          || / wv|; wv|version\/\d+\.\d+ mobile/.test(ua)
        );
      })();
      const searchParams = new URLSearchParams(window.location.search || '');
      const hashParams = new URLSearchParams(String(window.location.hash || '').replace(/^#/, ''));
      const hasAuthCallbackMarkers = [
        'code',
        'access_token',
        'refresh_token',
        'error',
        'error_code',
        'error_description',
        'oauthMode',
        'oauthRole',
      ].some((key) => searchParams.has(key) || hashParams.has(key));

      if (isLandingHost) {
        if (isAppLikeRuntime) {
          import('/src/main.tsx');
        } else if (marketingPolicyRedirects[window.location.pathname]) {
          const target = `${marketingPolicyRedirects[window.location.pathname]}${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        } else if (hasAuthCallbackMarkers) {
          const target = `https://rides.mairide.in${window.location.pathname}${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        } else {
          const target = `/landing.html${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        }
      } else {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
