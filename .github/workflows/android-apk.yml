name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.actor != 'github-actions[bot]'
    env:
      VITE_SUPABASE_URL: https://jcgoccsdlrjnratpaeje.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZ29jY3NkbHJqbnJhdHBhZWplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTkwMTQsImV4cCI6MjA5MDUzNTAxNH0.iPIawKCThu7lYMoGrWAyRDVvQPf5YICP7Ap_XOwAOrw
      VITE_SUPABASE_STORAGE_BUCKET: mairide-assets
      VITE_APP_VERSION: v3.0.1-beta
      PROD_SUPABASE_REF: jcgoccsdlrjnratpaeje
      STAGING_SUPABASE_REF: qnmetkbiuxwzmlwpxpuz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean previous Android wrapper and APK artifacts
        run: |
          rm -rf android
          rm -f public/downloads/mairide-android.apk
          rm -rf release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK build dependencies
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install SVG conversion tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor toolchain
        run: npm i -D @capacitor/cli @capacitor/core @capacitor/android

      - name: Generate Capacitor config
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'in.mairide.app',
            appName: 'MaiRide',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: {
              url: 'https://www.mairide.in',
              cleartext: false
            }
          };

          export default config;
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Apply MaiRide launcher icon
        run: |
          for spec in "mdpi 48 108" "hdpi 72 162" "xhdpi 96 216" "xxhdpi 144 324" "xxxhdpi 192 432"; do
            set -- $spec
            density=$1
            iconSize=$2
            fgSize=$3
            rsvg-convert -w "$iconSize" -h "$iconSize" public/icons/icon-512.svg -o "android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            rsvg-convert -w "$iconSize" -h "$iconSize" public/icons/icon-512.svg -o "android/app/src/main/res/mipmap-${density}/ic_launcher_round.png"
            rsvg-convert -w "$fgSize" -h "$fgSize" public/icons/icon-512.svg -o "android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png"
          done

      - name: Build debug APK
        id: build_apk
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee /tmp/gradle-build.log

      - name: Print Gradle failure context
        if: always()
        run: |
          if [ "${{ steps.build_apk.outcome }}" = "failure" ]; then
            echo "Gradle build failed. Showing last 220 lines:"
            tail -n 220 /tmp/gradle-build.log || true
          else
            echo "Gradle build succeeded."
          fi

      - name: Fail job when APK build fails
        if: steps.build_apk.outcome == 'failure'
        run: exit 1

      - name: Verify APK uses production Supabase
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK_PATH"
          # Source-level hard lock checks (must pass).
          if rg -n "$STAGING_SUPABASE_REF" src api >/dev/null 2>&1; then
            echo "Staging Supabase reference found in source."
            exit 1
          fi
          if ! rg -n "$PROD_SUPABASE_REF" src/lib/supabase.ts api/_lib/supabaseRuntime.ts >/dev/null 2>&1; then
            echo "Production Supabase reference not found in runtime source lock files."
            exit 1
          fi

          # APK-level safety check (best effort): fail only if staging appears.
          JS_ENTRY=$(unzip -Z1 "$APK_PATH" | grep '^assets/public/assets/index-.*\.js$' | head -n 1 || true)
          if [ -n "$JS_ENTRY" ]; then
            unzip -p "$APK_PATH" "$JS_ENTRY" > /tmp/apk-bundle.js || true
            if rg -n "$STAGING_SUPABASE_REF" /tmp/apk-bundle.js >/dev/null 2>&1; then
              echo "Staging Supabase reference found in APK bundle."
              exit 1
            fi
          fi
          echo "Supabase target verified: production-only lock is active."

      - name: Prepare artifact
        run: |
          mkdir -p release public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk release/mairide-android.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/mairide-android.apk
          APP_VERSION=${VITE_APP_VERSION}
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > public/downloads/android-update.json <<EOF
          {
            "appVersion": "${APP_VERSION}",
            "apkUrl": "/downloads/mairide-android.apk",
            "buildSha": "${GITHUB_SHA}",
            "builtAt": "${NOW_UTC}"
          }
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mairide-android-apk
          path: release/mairide-android.apk

      - name: Commit APK into repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/mairide-android.apk public/downloads/android-update.json
          if git diff --staged --quiet; then
            echo "No APK changes to commit."
            exit 0
          fi
          git commit -m "chore: update android apk [skip ci]"
          git push
