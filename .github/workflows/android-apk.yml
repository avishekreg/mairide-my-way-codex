name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.actor != 'github-actions[bot]'
    env:
      # Opt in now so JS-based actions run on Node 24 and avoid Node 20 deprecation warnings.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VITE_SUPABASE_URL: https://jcgoccsdlrjnratpaeje.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZ29jY3NkbHJqbnJhdHBhZWplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTkwMTQsImV4cCI6MjA5MDUzNTAxNH0.iPIawKCThu7lYMoGrWAyRDVvQPf5YICP7Ap_XOwAOrw
      VITE_SUPABASE_STORAGE_BUCKET: mairide-assets
      VITE_APP_VERSION: v3.0.1-beta
      PROD_SUPABASE_REF: jcgoccsdlrjnratpaeje
      STAGING_SUPABASE_REF: qnmetkbiuxwzmlwpxpuz
      MAIRIDE_UPLOAD_STORE_FILE: mairide-release.keystore

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean previous Android wrapper and APK artifacts
        run: |
          rm -rf android
          rm -rf release

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK build dependencies
        run: |
          yes | sdkmanager --licenses || true
          # Capacitor Android targets API 35 in recent templates.
          # Install both 35 and 34 toolchains for compatibility.
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "platforms;android-34" "build-tools;34.0.0"


      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor toolchain
        run: npm i -D @capacitor/cli @capacitor/core @capacitor/android

      - name: Generate Capacitor config
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'in.mairide.app',
            appName: 'MaiRide',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: {
              url: 'https://www.mairide.in',
              cleartext: false
            }
          };

          export default config;
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Prepare Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing Android signing secrets."
            echo "Required repository secrets:"
            echo "  - ANDROID_KEYSTORE_BASE64"
            echo "  - ANDROID_KEYSTORE_PASSWORD"
            echo "  - ANDROID_KEY_ALIAS"
            echo "  - ANDROID_KEY_PASSWORD"
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "android/app/${MAIRIDE_UPLOAD_STORE_FILE}"

          cat >> android/gradle.properties <<EOF
          MAIRIDE_UPLOAD_STORE_FILE=${MAIRIDE_UPLOAD_STORE_FILE}
          MAIRIDE_UPLOAD_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}
          MAIRIDE_UPLOAD_KEY_ALIAS=${ANDROID_KEY_ALIAS}
          MAIRIDE_UPLOAD_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Apply MaiRide launcher icon
        run: |
          ICON_SRC="public/logo.png"
          # Keep the Android launcher icon hardwired to the canonical logo asset.
          if [ -f "public/logo.png" ]; then
            cp -f public/logo.png public/icons/android-app-icon.png
          fi
          if [ ! -f "$ICON_SRC" ]; then
            echo "Missing launcher icon source: $ICON_SRC"
            exit 1
          fi
          # Ubuntu runners do not include sips; install ImageMagick for resizing.
          sudo apt-get update
          sudo apt-get install -y imagemagick
          if command -v magick >/dev/null 2>&1; then
            RESIZE_CMD="magick"
          elif command -v convert >/dev/null 2>&1; then
            RESIZE_CMD="convert"
          else
            echo "ImageMagick not found on runner."
            exit 1
          fi
          # Prefer bitmap launcher icon from a single canonical source to avoid icon drift.
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          mkdir -p android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi
          $RESIZE_CMD "$ICON_SRC" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          $RESIZE_CMD "$ICON_SRC" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          $RESIZE_CMD "$ICON_SRC" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          $RESIZE_CMD "$ICON_SRC" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          $RESIZE_CMD "$ICON_SRC" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Patch Gradle Kotlin dependency conflicts
        run: |
          cat >> android/build.gradle <<'EOF'

          allprojects {
            configurations.all {
              exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
              exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
              resolutionStrategy.force(
                "org.jetbrains.kotlin:kotlin-stdlib:1.8.22",
                "org.jetbrains.kotlin:kotlin-stdlib-common:1.8.22"
              )
              resolutionStrategy.eachDependency { d ->
                if (d.requested.group == "org.jetbrains.kotlin") {
                  if (d.requested.name == "kotlin-stdlib-jdk7" || d.requested.name == "kotlin-stdlib-jdk8") {
                    d.useTarget "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                    d.because("Avoid duplicate Kotlin stdlib classes in Android debug build")
                  } else if (d.requested.name == "kotlin-stdlib-common") {
                    d.useVersion "1.8.22"
                  } else if (d.requested.name == "kotlin-stdlib") {
                    d.useVersion "1.8.22"
                  }
                }
              }
            }
          }
          EOF

          cat >> android/app/build.gradle <<'EOF'

          android {
            signingConfigs {
              release {
                storeFile file(project.findProperty("MAIRIDE_UPLOAD_STORE_FILE") ?: "mairide-release.keystore")
                storePassword project.findProperty("MAIRIDE_UPLOAD_STORE_PASSWORD")
                keyAlias project.findProperty("MAIRIDE_UPLOAD_KEY_ALIAS")
                keyPassword project.findProperty("MAIRIDE_UPLOAD_KEY_PASSWORD")
              }
            }

            buildTypes {
              release {
                minifyEnabled false
                shrinkResources false
                signingConfig signingConfigs.release
              }
            }
          }

          configurations.configureEach {
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
            exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
          }

          dependencies {
            implementation("org.jetbrains.kotlin:kotlin-stdlib:1.8.22")
          }
          EOF

      - name: Build signed release APK
        id: build_apk
        run: |
          set -o pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee /tmp/gradle-build.log

      - name: Print Gradle failure context
        if: always()
        run: |
          if [ "${{ steps.build_apk.outcome }}" = "failure" ]; then
            echo "Gradle build failed. Showing last 220 lines:"
            tail -n 220 /tmp/gradle-build.log || true
          else
            echo "Gradle build succeeded."
          fi

      - name: Show built APK outputs
        if: always()
        run: |
          find android/app/build/outputs -type f | sed -n '1,200p' || true

      - name: Verify production Supabase source lock
        run: |
          # Hard fail if staging reference appears in runtime source.
          if grep -R "$STAGING_SUPABASE_REF" src api >/dev/null 2>&1; then
            echo "Staging Supabase reference found in source."
            exit 1
          fi

          # Hard fail if production reference is missing from both lock files.
          if ! grep -q "$PROD_SUPABASE_REF" src/lib/supabase.ts; then
            if ! grep -q "$PROD_SUPABASE_REF" api/_lib/supabaseRuntime.ts; then
              echo "Production Supabase reference not found in runtime source lock files."
              exit 1
            fi
          fi

          echo "Supabase production lock verified in source."

      - name: Prepare artifact
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          mkdir -p release public/downloads
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced. Failing workflow to surface real build issue."
            exit 1
          fi
          echo "Using newly built APK: $APK_PATH"
          cp "$APK_PATH" release/mairide-android.apk
          # Also publish a versioned filename to avoid client/CDN caching stale APKs.
          VERSIONED_APK="mairide-android-${GITHUB_RUN_NUMBER}.apk"
          cp "$APK_PATH" "public/downloads/${VERSIONED_APK}"
          cp "$APK_PATH" "public/downloads/mairide-android.apk"
          APP_VERSION_BASE="${VITE_APP_VERSION}"
          APP_VERSION="${APP_VERSION_BASE}+build.${GITHUB_RUN_NUMBER}"
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Publish a stable direct-download URL on R2 custom domain.
          APK_PUBLIC_URL="https://downloads.mairide.in/mairide-android.apk"
          cat > public/downloads/android-update.json <<EOF
          {
            "appVersion": "${APP_VERSION}",
            "apkUrl": "${APK_PUBLIC_URL}",
            "buildSha": "${GITHUB_SHA}",
            "builtAt": "${NOW_UTC}"
          }
          EOF

      - name: Upload APK to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "Missing Cloudflare R2 credentials (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, R2_BUCKET)."
            exit 1
          fi
          npx --yes wrangler@3 r2 object put "$R2_BUCKET/mairide-android.apk" --file release/mairide-android.apk --content-type application/vnd.android.package-archive
          npx --yes wrangler@3 r2 object put "$R2_BUCKET/mairide-android-${GITHUB_RUN_NUMBER}.apk" --file release/mairide-android.apk --content-type application/vnd.android.package-archive

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mairide-android-apk
          path: release/mairide-android.apk

      - name: Publish APK to GitHub Release (android-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: MaiRide Android Latest
          body: |
            Auto-published APK from CI run #${{ github.run_number }}.
          prerelease: true
          make_latest: false
          files: release/mairide-android.apk
          overwrite_files: true

      - name: Commit APK metadata into repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the metadata file so the repo always reflects the latest build info.
          git add -f public/downloads/android-update.json
          if git diff --staged --quiet; then
            echo "No update metadata changes to commit."
            exit 0
          fi
          git commit -m "chore: update android release metadata [skip ci]"
          git push origin HEAD:main

      - name: Strict CI failure alert
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI ALERT] Android APK build failed";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Android APK build failed on main.",
              "",
              `- Branch: \`${context.ref}\``,
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              "",
              "Please investigate immediately before release."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "ci-alert",
              per_page: 50
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["ci-alert"]
              });
            }
