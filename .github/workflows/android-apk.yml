name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor toolchain
        run: npm i -D @capacitor/cli @capacitor/core @capacitor/android

      - name: Generate Capacitor config
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'in.mairide.app',
            appName: 'MaiRide',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: {
              androidScheme: 'https'
            }
          };

          export default config;
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p release public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk release/mairide-android.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/mairide-android.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mairide-android-apk
          path: release/mairide-android.apk

      - name: Commit APK into repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/mairide-android.apk
          if git diff --staged --quiet; then
            echo "No APK changes to commit."
            exit 0
          fi
          git commit -m "chore: update android apk [skip ci]"
          git push
