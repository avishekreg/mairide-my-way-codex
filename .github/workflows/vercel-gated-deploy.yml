name: Deploy to Vercel (Gated by APK Build)

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  blocked-alert:
    if: >
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment blocked alert
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI ALERT] Production deploy blocked (APK build failed)";
            const runUrl = context.payload.workflow_run.html_url;
            const body = [
              "Production deploy was blocked because the Android APK workflow failed.",
              "",
              `- Source workflow run: ${runUrl}`,
              `- Branch: \`${context.payload.workflow_run.head_branch}\``,
              `- Commit: \`${context.payload.workflow_run.head_sha}\``,
              "",
              "Fix APK pipeline first, then re-run deployment."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "ci-alert",
              per_page: 50
            });
            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["ci-alert"]
              });
            }

  deploy-production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout exact commit from successful APK run
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN secret" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID secret" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
